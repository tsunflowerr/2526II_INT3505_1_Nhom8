name: CI-CD

on:
  pull_request:
  push:
    branches:
      - master
      - main
      - thienqd
  workflow_dispatch:

jobs:
  unit-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: booking_api
            language: go
            coverage_target: internal/...
            coverage_threshold: "90"
          - module: event_service
            language: go
            coverage_target: internal/...
            coverage_threshold: "90"
          - module: user_api
            language: python

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        if: matrix.language == 'go'
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.module }}/go.mod
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: Download dependencies
        if: matrix.language == 'go'
        working-directory: ${{ matrix.module }}
        run: go mod download

      - name: Run Go unit tests
        if: matrix.language == 'go'
        working-directory: ${{ matrix.module }}
        run: go test ./...

      - name: Coverage gate
        if: matrix.language == 'go'
        run: |
          ./scripts/coverage_gate.sh "${{ matrix.module }}" "${{ matrix.coverage_threshold }}" "${{ matrix.coverage_target }}"

      - name: Setup Python
        if: matrix.language == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: user_api/requirements.txt

      - name: Install Python dependencies
        if: matrix.language == 'python'
        working-directory: user_api
        run: pip install -r requirements.txt

      - name: Run Python unit tests
        if: matrix.language == 'python'
        working-directory: user_api
        run: pytest

  build:
    name: Build and push images
    runs-on: ubuntu-latest
    needs:
      - unit-test
    if: github.event_name != 'pull_request'

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: booking_api
            context: ./booking_api
            dockerfile: ./booking_api/Dockerfile
          - name: event_service
            context: ./event_service
            dockerfile: ./event_service/Dockerfile
          - name: migration_services
            context: ./migration_services
            dockerfile: ./migration_services/Dockerfile
          - name: user_api
            context: ./user_api
            dockerfile: ./user_api/Dockerfile
          - name: web
            context: ./ticketrush-web
            dockerfile: ./ticketrush-web/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase registry owner
        run: echo "REGISTRY_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.REGISTRY_OWNER }}/ticketrush-${{ matrix.name }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Validate web OAuth build args
        if: matrix.name == 'web'
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.VITE_GOOGLE_CLIENT_ID }}" ]; then
            echo "Missing required secret: VITE_GOOGLE_CLIENT_ID"
            exit 1
          fi

      - name: Build and push image (non-web)
        if: matrix.name != 'web'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push image (web with OAuth build args)
        if: matrix.name == 'web'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_USER_API_URL=/user-api
            VITE_EVENT_API_URL=/event-api/api/v1
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
            VITE_FACEBOOK_APP_ID=${{ secrets.VITE_FACEBOOK_APP_ID }}
            VITE_OAUTH_REDIRECT_BASE_URL=${{ vars.VITE_OAUTH_REDIRECT_BASE_URL }}

  deploy-production:
    name: Deploy to production server
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load production compose content
        id: compose
        run: |
          echo "content<<EOF" >> "$GITHUB_OUTPUT"
          cat deploy/docker-compose.prod.yaml >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          REGISTRY_OWNER: ${{ github.repository_owner }}
          IMAGE_TAG: ${{ github.sha }}
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          COMPOSE_FILE_CONTENT: ${{ steps.compose.outputs.content }}

        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          envs: REGISTRY_OWNER,IMAGE_TAG,PROD_ENV_FILE,GHCR_USERNAME,GHCR_TOKEN,COMPOSE_FILE_CONTENT

          script: |
            set -euo pipefail

            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            REGISTRY_OWNER="$(echo "${REGISTRY_OWNER}" | tr '[:upper:]' '[:lower:]')"
            COMPOSE_FILE="${DEPLOY_PATH}/docker-compose.prod.yaml"

            mkdir -p "${DEPLOY_PATH}"
            cd "${DEPLOY_PATH}"

            echo "Writing .env from PROD_ENV_FILE secret"
            printf '%s\n' "${PROD_ENV_FILE}" > .env
            echo "Writing docker-compose.prod.yaml from workflow content"
            printf '%s\n' "${COMPOSE_FILE_CONTENT}" > "${COMPOSE_FILE}"

            export REGISTRY_NAMESPACE="${REGISTRY_OWNER}"
            export IMAGE_TAG="${IMAGE_TAG}"

            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin

            if [ ! -f "${COMPOSE_FILE}" ]; then
              echo "Missing compose file at ${COMPOSE_FILE}"
              ls -la "${DEPLOY_PATH}" || true
              exit 1
            fi

            docker compose -f "${COMPOSE_FILE}" pull

            docker compose -f "${COMPOSE_FILE}" up -d --remove-orphans

            docker image prune -af || true

            sleep 5
            curl -f http://localhost:8080/healthz || (echo "Health check failed" && exit 1)
            curl -f http://localhost:${USER_API_PORT:-8082}/healthz || (echo "User API health check failed" && exit 1)
            MINIO_CID="$(docker compose -f "${COMPOSE_FILE}" ps -q minio)"
            if [ -z "${MINIO_CID}" ]; then
              echo "MinIO container was not created"
              docker compose -f "${COMPOSE_FILE}" ps
              exit 1
            fi
            MINIO_HEALTH="$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "${MINIO_CID}")"
            if [ "${MINIO_HEALTH}" != "healthy" ]; then
              echo "MinIO health check failed (status=${MINIO_HEALTH})"
              docker logs "${MINIO_CID}" --tail 120 || true
              exit 1
            fi

            docker compose -f "${COMPOSE_FILE}" logs -n 50
