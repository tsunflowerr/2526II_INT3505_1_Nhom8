services:
  postgres:
    image: postgres:16
    container_name: ticket_postgres
    restart: always

    env_file:
      - ../.env

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER}" ]
      interval: 5s
      timeout: 5s
      retries: 5

    networks:
      - backend

  minio:
    image: minio/minio:latest
    container_name: ticket_minio
    restart: always

    env_file:
      - ../.env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}

    command: server /data --console-address ":9001"

    ports:
      - "9000:9000"
      - "9001:9001"

    volumes:
      - minio_data:/data

    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 5s
      timeout: 5s
      retries: 5

    networks:
      - backend

  migrations:
    build:
      context: ../migration_services
      dockerfile: Dockerfile
    image: ticketrush-migration:local

    env_file:
      - ../.env
    environment:
      POSTGRES_HOST: postgres

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - backend

  event_service:
    build:
      context: ../event_service
      dockerfile: Dockerfile
    image: ticketrush-event_service:local
    restart: always

    env_file:
      - ../.env
    environment:
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      POSTGRES_HOST: postgres

    depends_on:
      migrations:
        condition: service_completed_successfully

    ports:
      - "8080:8080"

    networks:
      - backend

  booking_api:
    build:
      context: ../booking_api
      dockerfile: Dockerfile
    image: ticketrush-booking_api:local
    restart: always

    env_file:
      - ../.env
    environment:
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8081
      POSTGRES_HOST: postgres

    depends_on:
      migrations:
        condition: service_completed_successfully

    ports:
      - "8081:8081"

    networks:
      - backend

  user_api:
    build:
      context: ../user_api
      dockerfile: Dockerfile
    image: ticketrush-user_api:local
    restart: always

    env_file:
      - ../.env
    environment:
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8082
      POSTGRES_HOST: postgres
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-minio}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-ticketrush-media}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-http://localhost:9000/ticketrush-media}
      UPLOAD_MAX_BYTES: ${UPLOAD_MAX_BYTES:-52428800}

    depends_on:
      migrations:
        condition: service_completed_successfully
      minio:
        condition: service_healthy

    ports:
      - "8082:8082"

    networks:
      - backend

  web:
    build:
      context: ../ticketrush-web
      dockerfile: Dockerfile
      args:
        VITE_USER_API_URL: ${VITE_USER_API_URL:-/user-api}
        VITE_EVENT_API_URL: ${VITE_EVENT_API_URL:-/event-api/api/v1}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
        VITE_FACEBOOK_APP_ID: ${VITE_FACEBOOK_APP_ID:-}
        VITE_OAUTH_REDIRECT_BASE_URL: ${VITE_OAUTH_REDIRECT_BASE_URL:-}
    image: ticketrush-web:local
    restart: always

    ports:
      - "3000:80"

    depends_on:
      - event_service
      - booking_api
      - user_api

    networks:
      - backend

volumes:
  postgres_data:
  minio_data:

networks:
  backend:
