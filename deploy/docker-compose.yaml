services:
  postgres:
    image: postgres:16
    container_name: ticket_postgres
    restart: always

    env_file:
      - ../.env

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER}" ]
      interval: 5s
      timeout: 5s
      retries: 5

    networks:
      - backend

  migrations:
    image: migration:1.0.0

    env_file:
      - ../.env
    environment:
      POSTGRES_HOST: postgres

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - backend

volumes:
  postgres_data:

networks:
  backend:

