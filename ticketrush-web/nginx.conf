server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location /healthz {
    access_log off;
    default_type text/plain;
    return 200 'ok\n';
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /user-api/ {
    proxy_pass http://user_api:8082/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /event-api/ {
    proxy_pass http://event_service:8080/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /ticketrush-media/ {
    proxy_pass http://minio:9000/ticketrush-media/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}