groups:
  - name: ticketrush-service-health
    rules:
      - alert: TicketRushServiceDown
        expr: up{job=~"ticket-apps|web-nginx|postgres|redis|minio"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.service }} is down"
          description: "Prometheus cannot scrape {{ $labels.instance }} for more than 1 minute."

      - alert: TicketRushHighHTTPErrorRate
        expr: |
          sum by (service) (rate(ticketrush_event_api_http_requests_total{status=~"5.."}[5m]))
          /
          clamp_min(sum by (service) (rate(ticketrush_event_api_http_requests_total[5m])), 0.001) > 0.05
          or
          sum by (service) (rate(ticketrush_booking_api_http_requests_total{status=~"5.."}[5m]))
          /
          clamp_min(sum by (service) (rate(ticketrush_booking_api_http_requests_total[5m])), 0.001) > 0.05
          or
          sum by (service) (rate(ticketrush_user_api_http_requests_total{status=~"5.."}[5m]))
          /
          clamp_min(sum by (service) (rate(ticketrush_user_api_http_requests_total[5m])), 0.001) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High 5xx rate on {{ $labels.service }}"
          description: "{{ $labels.service }} has more than 5% HTTP 5xx responses over 5 minutes."

      - alert: TicketRushHighLatencyP95
        expr: |
          histogram_quantile(0.95, sum by (service, le) (rate(ticketrush_event_api_http_request_duration_seconds_bucket[5m]))) > 1
          or
          histogram_quantile(0.95, sum by (service, le) (rate(ticketrush_booking_api_http_request_duration_seconds_bucket[5m]))) > 1
          or
          histogram_quantile(0.95, sum by (service, le) (rate(ticketrush_user_api_http_request_duration_seconds_bucket[5m]))) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High p95 latency on {{ $labels.service }}"
          description: "{{ $labels.service }} p95 latency is above 1 second for 5 minutes."

      - alert: TicketRushPostgresTooManyConnections
        expr: sum(pg_stat_activity_count) / sum(pg_settings_max_connections) > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Postgres connection usage is high"
          description: "Postgres is using more than 80% of max_connections."

      - alert: TicketRushRedisRejectedConnections
        expr: increase(redis_rejected_connections_total[5m]) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Redis rejected connections"
          description: "Redis rejected at least one connection in the last 5 minutes."
