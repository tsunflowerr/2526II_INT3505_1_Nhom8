services:
  postgres:
    image: postgres:16
    container_name: ticket_postgres
    restart: always

    env_file:
      - ../.env

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER}" ]
      interval: 5s
      timeout: 5s
      retries: 5

    networks:
      - backend

  migrations:
    build:
      context: ../migration_services
      dockerfile: Dockerfile
    image: ticketrush-migration:local

    env_file:
      - ../.env
    environment:
      POSTGRES_HOST: postgres

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - backend

  event_service:
    build:
      context: ../event_service
      dockerfile: Dockerfile
    image: ticketrush-event_service:local
    restart: always

    env_file:
      - ../.env
    environment:
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      POSTGRES_HOST: postgres

    depends_on:
      migrations:
        condition: service_completed_successfully

    ports:
      - "8080:8080"

    networks:
      - backend

  booking_api:
    build:
      context: ../booking_api
      dockerfile: Dockerfile
    image: ticketrush-booking_api:local
    restart: always

    env_file:
      - ../.env
    environment:
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8081
      POSTGRES_HOST: postgres

    depends_on:
      migrations:
        condition: service_completed_successfully

    ports:
      - "8081:8081"

    networks:
      - backend

  user_api:
    build:
      context: ../user_api
      dockerfile: Dockerfile
    image: ticketrush-user_api:local
    restart: always

    env_file:
      - ../.env
    environment:
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8082
      POSTGRES_HOST: postgres

    depends_on:
      migrations:
        condition: service_completed_successfully

    ports:
      - "8082:8082"

    networks:
      - backend

  web:
    build:
      context: ../ticketrush-web
      dockerfile: Dockerfile
    image: ticketrush-web:local
    restart: always

    ports:
      - "3000:80"

    depends_on:
      - event_service
      - booking_api
      - user_api

    networks:
      - backend

volumes:
  postgres_data:

networks:
  backend:
